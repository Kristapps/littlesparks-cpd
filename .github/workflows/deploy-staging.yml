name: Deploy to Staging

on:
  push:
    branches:
      - staging

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Deploy via SFTP
        uses: SamKirkland/FTP-Deploy-Action@v4.3.5
        with:
          server: ${{ secrets.STAGING_SFTP_HOST }}
          username: ${{ secrets.STAGING_SFTP_USER }}
          password: ${{ secrets.STAGING_SFTP_PASS }}
          protocol: ftps
          port: 21
          
          # DESTINATION ON SERVER: 
          # Assuming your FTP user starts at /home/user/, this targets the staging folder directly.
          server-dir: ../staging/wp-content/
          
          # SOURCE FROM GITHUB REPO:
          # If your repo's files are inside a "public_html/wp-content" folder, 
          # this tells the action to ONLY grab the contents inside that folder, 
          # preventing the "Matryoshka doll" nesting effect.
          local-dir: ./
          
          dangerous-clean-slate: false
          exclude: |
            **/.git*
            **/.github/**
            **/.gitignore
            **/.dev/**
            **/CLAUDE.md
            **/PROJECT-CONTEXT.md
            **/.claude/**
            **/.claude-code/**
            **/node_modules/**
            **/README.md
            **/NOTES.md
            **/TODO.md
            **/*.log